name: Deploy branch to GitHub Pages

on:
  push:
    branches:
      - '**'
  delete:

# Serialize all deploys to gh-pages to prevent race conditions.
concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout or create gh-pages branch
        run: |
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages origin/gh-pages
          else
            git worktree add --detach gh-pages
            cd gh-pages
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf .
            touch .nojekyll
            echo '<!DOCTYPE html><html><head><title>MS_Phaty Previews</title></head><body><h1>MS_Phaty Branch Previews</h1><p>Previews are at /&lt;branch-name&gt;/</p></body></html>' > index.html
            git add .nojekyll index.html
            git commit -m "Initialize gh-pages branch"
            git push -u origin gh-pages
          fi

      - name: Compute folder name
        id: folder
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          FOLDER=$(echo "$BRANCH" | sed 's|/|--|g')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "folder=$FOLDER" >> "$GITHUB_OUTPUT"

      - name: Copy branch files to gh-pages subfolder
        run: |
          FOLDER="${{ steps.folder.outputs.folder }}"
          rm -rf "gh-pages/$FOLDER"
          mkdir -p "gh-pages/$FOLDER"
          rsync -a --exclude='.git' --exclude='gh-pages' --exclude='.github' ./ "gh-pages/$FOLDER/"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy branch ${{ steps.folder.outputs.branch }} to /${{ steps.folder.outputs.folder }}"
            git push origin HEAD:gh-pages
          fi

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Compute folder name
        id: folder
        run: |
          BRANCH="${{ github.event.ref }}"
          FOLDER=$(echo "$BRANCH" | sed 's|/|--|g')
          echo "folder=$FOLDER" >> "$GITHUB_OUTPUT"

      - name: Remove branch folder
        run: |
          if [ -d "${{ steps.folder.outputs.folder }}" ]; then
            rm -rf "${{ steps.folder.outputs.folder }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Clean up /${{ steps.folder.outputs.folder }} (branch deleted)"
            git push
          else
            echo "Folder ${{ steps.folder.outputs.folder }} not found, nothing to clean up"
          fi
